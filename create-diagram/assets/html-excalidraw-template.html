<body data-theme="light">

<div id="canvas-container">

  </div>
  <div id="font-menu" role="menu" aria-label="Diagram fonts"></div>
  <aside id="walkthrough-card" aria-label="Walkthrough step">

    <span id="wt-card-count">1/4</span>
    <h2 id="wt-card-title">Step title</h2>
    <p id="wt-card-desc">Step description</p>

    <defs>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <circle id="grid-dot" cx="10" cy="10" r="0.8" fill="#d4c9b8" opacity="0.4"/>
      </pattern>
    </defs>
    <rect id="bg-grid" width="100%" height="100%" fill="url(#grid)"/>
    <g id="viewport-group">
      <g id="clusters-layer"></g>
      <g id="edges-layer"></g>
      <g id="nodes-layer"></g>
    </g>
    <g id="overlay-layer"></g>
  </svg>
  <aside id="legend-panel" class="collapsed" aria-label="Diagram legend">
    <button id="legend-toggle" type="button" aria-expanded="false" aria-controls="legend-list"><span>Legend</span><span aria-hidden="true">+</span></button>
    <div id="legend-list" class="legend-list"></div>
  </aside>
  <div id="instructions">Drag nodes | Scroll to zoom | Drag background to pan</div>
  <aside id="brief-panel" class="collapsed" aria-label="Diagram brief" aria-live="polite"></aside>
  <div id="warnings" role="status" aria-live="polite"></div>
  <aside id="details-panel" aria-live="polite"></aside>
</div>

<script type="module">

    nodeTypes: {
      service:           { fill: '#111a22', stroke: '#6aa3d8', label: 'Service', shape: 'service' },
      'external-system': { fill: '#1f1410', stroke: '#e8602c', label: 'External System', shape: 'cloud' },
      database:          { fill: '#101a1a', stroke: '#2a9a88', label: 'Database', shape: 'database' },
      queue:             { fill: '#101722', stroke: '#4e93c8', label: 'Queue', shape: 'queue' },
      file:              { fill: '#211c10', stroke: '#d0a142', label: 'File', shape: 'file' },
      document:          { fill: '#211f14', stroke: '#c8ac66', label: 'Document', shape: 'document' },
      'object-store':    { fill: '#101c18', stroke: '#37a887', label: 'Object Store', shape: 'bucket' },
      actor:             { fill: '#1d1222', stroke: '#b66ad4', label: 'Actor', shape: 'actor' },
      process:           { fill: '#111824', stroke: '#6f9fca', label: 'Process', shape: 'process' },
      decision:          { fill: '#20160f', stroke: '#e08936', label: 'Decision', shape: 'decision' },
      event:             { fill: '#15162a', stroke: '#7e86df', label: 'Event', shape: 'event' },
      concept:           { fill: '#14121a', stroke: '#9d6fd0', label: 'Concept', shape: 'note' },
      'failure-state':   { fill: '#1a1010', stroke: '#d65e5e', label: 'Failure State', shape: 'warning' },
    },
  },
};
function th() { return THEMES[currentTheme]; }

let currentTheme = localStorage.getItem('diagram-theme') || 'light';
let NODE_TYPES = th().nodeTypes;
const DIAGRAM_FONTS = [
  { name: 'Indie Flower', css: "'Indie Flower'" },
  { name: 'Architects Daughter', css: "'Architects Daughter'" },
  { name: 'Caveat', css: "'Caveat'" },
  { name: 'Patrick Hand', css: "'Patrick Hand'" },
  { name: 'Kalam', css: "'Kalam'" },
  { name: 'Permanent Marker', css: "'Permanent Marker'" },
  { name: 'Shadows Into Light', css: "'Shadows Into Light'" },
  { name: 'Gloria Hallelujah', css: "'Gloria Hallelujah'" },
  { name: 'Comic Neue', css: "'Comic Neue'" },
  { name: 'Short Stack', css: "'Short Stack'" },
];
const DEFAULT_DIAGRAM_FONT = 'Indie Flower';
let currentFontName = getSavedDiagramFontName();

// Source of truth: assets/geometry-config.json. Parity test verifies both match.
const NODE_W = 340, NODE_H = 124;
const NODE_H_DESC = 205, TITLE_FONT_SIZE = 36, DESCRIPTION_FONT_SIZE = 24, MAX_DESC_CHARS = 96, MAX_DESC_LINES = 3;
const CLUSTER_PAD = 56, CLUSTER_LABEL_H = 44;
const NODE_GAP_Y = 72, COLLISION_GAP = 64, CLUSTER_INTRUSION_GAP = 72, CLUSTER_GAP_X = 160;
const CIRCULAR_RADIUS_FACTOR = 80, CIRCULAR_MIN_RADIUS = 200;
const EDGE_END_PAD = 16;
const EDGE_MIN_SEPARATION = 52, EDGE_LAYOUT_STEP = 46, EDGE_LAYOUT_LIMIT = 184, EDGE_LAYOUT_PASSES = 4;
const MIN_READABLE_SCALE = 0.58;
const VERSION = 11;

const canvas = document.getElementById('canvas');
const $ = id => document.getElementById(id);
const rc = window.roughjs.svg(canvas);

/* ---------- state ---------- */
let state = {
  nodes: [], edges: [], clusters: [],
  viewX: 0, viewY: 0, viewScale: 1,
  isDragging: false, isPanning: false,
  dragNodeId: null, dragOffX: 0, dragOffY: 0,
  panStartX: 0, panStartY: 0, panStartVX: 0, panStartVY: 0,
  edgeElements: [], warnings: [],
  selectedNodeId: null, selectedEdgeIndex: null,
  legendExpanded: false,
  briefExpanded: false,
  walkthroughActive: false,
  walkthroughSteps: [],
  walkthroughCurrentStep: -1,
};

const el = { nodes: {}, edgeGroups: [], clusters: {} };

/* ---------- helpers ---------- */
function nodeW(label, desc) {
  const labelW = label.length * 18 + 88;
  const descW = desc ? Math.min(desc.length, MAX_DESC_CHARS) * 10.6 + 76 : 0;
  return Math.max(NODE_W, labelW, descW);
}
function nodeH(node) {
  if (!node.description) return NODE_H;
  const approxLines = Math.ceil(node.description.length / 31);
  const lines = Math.min(approxLines, MAX_DESC_LINES);
  return NODE_H_DESC + (lines - 1) * 30;
}
function truncate(str, max) { return str && str.length > max ? str.slice(0, max) + '\u2026' : str; }
function wrapText(text, maxCharsPerLine) {
  if (!text) return [];
  const words = text.split(' ');
  const lines = [];
  let curLine = '';
  for (const word of words) {
    const test = curLine ? curLine + ' ' + word : word;
    if (test.length > maxCharsPerLine && curLine) {
      lines.push(curLine);
      if (lines.length >= MAX_DESC_LINES) {
        lines[lines.length - 1] = lines[lines.length - 1].replace(/\s*\S*$/, '\u2026');
        return lines;
      }
      curLine = word;
    } else {
      curLine = test;
    }
  }
  if (curLine) lines.push(curLine);
  return lines;
}
const TYPE_ALIASES = {
  'internal-service': 'service',
  'data-store': 'database',
};

function normalizeType(type) {
  return TYPE_ALIASES[type] || type || 'service';
}

function nodeTypeDef(type) {
  return NODE_TYPES[normalizeType(type)] || NODE_TYPES.service;
}

const VALID_CONFIDENCE = new Set(['observed', 'inferred', 'stated']);

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function readAgentMetadata() {
  const metadataEl = document.getElementById('agent-metadata');
  if (!metadataEl) return { metadata: null, error: 'Missing #agent-metadata JSON block.' };
  try {
    return { metadata: JSON.parse(metadataEl.textContent || '{}'), error: null };
  } catch (err) {
    return { metadata: null, error: 'Invalid #agent-metadata JSON: ' + err.message };
  }
}

function validateDiagramData(data) {
  const warnings = [];
  const validFidelity = new Set(['narrative-architecture', 'exact-code-graph', 'executive-concept-map']);
  if (data.fidelity && !validFidelity.has(data.fidelity)) warnings.push(`Unknown fidelity "${data.fidelity}".`);
  if (Array.isArray(data.takeaways) && data.takeaways.length > 3) warnings.push('Brief panel should use no more than 3 takeaways.');
  const ids = new Set();
  const dupes = new Set();
  (data.nodes || []).forEach(n => {
    if (!n.id) warnings.push('A node is missing an id.');
    if (ids.has(n.id)) dupes.add(n.id);
    ids.add(n.id);
    if (!NODE_TYPES[normalizeType(n.type)]) warnings.push(`Unknown node type "${n.type}" on "${n.label || n.id}".`);
  });
  dupes.forEach(id => warnings.push(`Duplicate node id "${id}".`));
  if (!(data.nodes || []).length) warnings.push('Diagram has no nodes.');
  (data.edges || []).forEach(e => {
    const edgeName = e.label || 'unlabeled';
    if (!e.label) warnings.push(`Missing edge label for "${e.sourceId || 'unknown'}" -> "${e.targetId || 'unknown'}".`);
    if (!VALID_CONFIDENCE.has(e.confidence)) warnings.push(`Invalid confidence "${e.confidence || 'missing'}" for edge "${edgeName}".`);
    if (!e.evidence) warnings.push(`Missing evidence for edge "${edgeName}".`);
    if (!ids.has(e.sourceId)) warnings.push(`Dangling edge source "${e.sourceId}" for "${edgeName}".`);
    if (!ids.has(e.targetId)) warnings.push(`Dangling edge target "${e.targetId}" for "${edgeName}".`);
  });
  (data.clusters || []).forEach(c => {
    (c.nodeIds || []).forEach(id => {
      if (!ids.has(id)) warnings.push(`Cluster "${c.label || c.id}" references missing node "${id}".`);
    });
  });
  if (Array.isArray(data.walkthrough)) {
    const wtIds = new Set();
    data.walkthrough.forEach((step, i) => {
      if (!step.id) warnings.push(`Walkthrough step ${i} is missing an id.`);
      if (step.id && wtIds.has(step.id)) warnings.push(`Duplicate walkthrough step id "${step.id}".`);
      if (step.id) wtIds.add(step.id);
      if (!step.title) warnings.push(`Walkthrough step "${step.id || i}" is missing a title.`);
      if (!Array.isArray(step.nodeIds) || !step.nodeIds.length) warnings.push(`Walkthrough step "${step.id || i}" has no nodeIds.`);
      (step.nodeIds || []).forEach(id => { if (!ids.has(id)) warnings.push(`Walkthrough step "${step.id || i}" references missing node "${id}".`); });
    });
  }
  const { metadata, error } = readAgentMetadata();
  if (error) warnings.push(error);
  if (metadata) {
    ['audience', 'purpose', 'fidelity'].forEach(field => {
      if (data[field] && metadata[field] !== data[field]) warnings.push(`#agent-metadata.${field} does not match DIAGRAM_DATA.${field}.`);
    });
    const entityIds = new Set((metadata.entities || []).map(entity => entity.id));
    ids.forEach(id => {
      if (!entityIds.has(id)) warnings.push(`#agent-metadata.entities is missing node id "${id}".`);
    });
    (metadata.entities || []).forEach(entity => {
      if (!ids.has(entity.id)) warnings.push(`#agent-metadata.entities references missing DIAGRAM_DATA node id "${entity.id}".`);
    });
    (metadata.relationships || []).forEach(rel => {
      const relName = rel.label || 'unlabeled';
      if (!rel.label) warnings.push(`Missing metadata relationship label for "${rel.sourceId || 'unknown'}" -> "${rel.targetId || 'unknown'}".`);
      if (!VALID_CONFIDENCE.has(rel.confidence)) warnings.push(`Invalid metadata confidence "${rel.confidence || 'missing'}" for relationship "${relName}".`);
      if (!rel.evidence) warnings.push(`Missing metadata evidence for relationship "${relName}".`);
      if (!ids.has(rel.sourceId)) warnings.push(`#agent-metadata.relationships has dangling source "${rel.sourceId}" for "${relName}".`);
      if (!ids.has(rel.targetId)) warnings.push(`#agent-metadata.relationships has dangling target "${rel.targetId}" for "${relName}".`);
    });
  }
  return warnings;
}

function renderWarnings() {
  const box = document.getElementById('warnings');
  if (!box) return;
  if (!state.warnings.length) {
    box.style.display = 'none';
    box.textContent = '';
    return;
  }
  box.innerHTML = `<strong>Diagram warnings</strong>${state.warnings.slice(0, 4).map(w => `<div>${escapeHtml(w)}</div>`).join('')}`;
  if (state.warnings.length > 4) box.innerHTML += `<div>+${state.warnings.length - 4} more in console</div>`;
  box.style.display = 'block';
  console.warn('Diagram warnings:', state.warnings);
}

function getFontDef(name) {
  return DIAGRAM_FONTS.find(font => font.name === name) || DIAGRAM_FONTS[0];
}

function getSavedDiagramFontName() {
  try {
    const saved = localStorage.getItem('diagram-font');
    return DIAGRAM_FONTS.some(font => font.name === saved) ? saved : DEFAULT_DIAGRAM_FONT;
  } catch {
    return DEFAULT_DIAGRAM_FONT;
  }
}

function fontCssStack(name) {
  const font = getFontDef(name);
  return `${font.css}, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
}

function renderFontMenu() {
  const menu = document.getElementById('font-menu');
  if (!menu) return;
  menu.innerHTML = '';
  DIAGRAM_FONTS.forEach(font => {
    const item = document.createElement('button');
    item.type = 'button';
    item.role = 'menuitem';
    item.textContent = font.name;
    item.dataset.fontName = font.name;
    item.style.fontFamily = fontCssStack(font.name);
    item.classList.toggle('active', font.name === currentFontName);
    item.addEventListener('click', e => {
      e.stopPropagation();
      setDiagramFont(font.name);
      closeFontMenu();
    });
    menu.appendChild(item);
  });
}

function positionFontMenu() {
  const menu = document.getElementById('font-menu');
  const toggle = document.getElementById('font-menu-toggle');
  if (!menu || !toggle) return;
  const rect = toggle.getBoundingClientRect();
  const width = Math.min(360, window.innerWidth - 32);
  const left = Math.max(16, Math.min(rect.left + rect.width / 2 - width / 2, window.innerWidth - width - 16));
  menu.style.width = width + 'px';
  menu.style.left = left + 'px';
  menu.style.top = (rect.bottom + 8) + 'px';
  menu.style.transform = 'none';
}

function openFontMenu() {
  const menu = document.getElementById('font-menu');
  const toggle = document.getElementById('font-menu-toggle');
  if (!menu || !toggle) return;
  positionFontMenu();
  renderFontMenu();
  menu.classList.add('open');
  toggle.setAttribute('aria-expanded', 'true');
}

function closeFontMenu() {
  const menu = document.getElementById('font-menu');
  const toggle = document.getElementById('font-menu-toggle');
  if (menu) menu.classList.remove('open');
  if (toggle) toggle.setAttribute('aria-expanded', 'false');
}

function toggleFontMenu() {
  const menu = document.getElementById('font-menu');
  if (menu && menu.classList.contains('open')) closeFontMenu();
  else openFontMenu();
}

function setDiagramFont(name, { persist = true, rerender = true } = {}) {
  currentFontName = getFontDef(name).name;
  document.documentElement.style.setProperty('--diagram-font', fontCssStack(currentFontName));
  if (persist) {
    try { localStorage.setItem('diagram-font', currentFontName); } catch { /* ignore unavailable storage */ }
  }
  renderFontMenu();
  verifyDiagramFont();
  if (rerender && state.nodes.length) renderAll();
}

async function verifyDiagramFont() {
  if (!document.fonts) return;
  const font = getFontDef(currentFontName);
  const previousWarningCount = state.warnings.length;
  state.warnings = state.warnings.filter(w => !w.endsWith('failed to load; diagram text may use a fallback font.'));
  if (state.warnings.length !== previousWarningCount) renderWarnings();
  try {
    await document.fonts.load(`16px ${font.css}`);
    if (!document.fonts.check(`16px ${font.css}`)) {
      state.warnings.push(`${font.name} failed to load; diagram text may use a fallback font.`);
      renderWarnings();
    }
  } catch {
    state.warnings.push(`${font.name} failed to load; diagram text may use a fallback font.`);
    renderWarnings();
  }
}

const nodeMap = {};

function boxesOverlap(a, b, gap = 0) {
  return a.x < b.x + b.w + gap &&
    a.x + a.w + gap > b.x &&
    a.y < b.y + b.h + gap &&
    a.y + a.h + gap > b.y;
}

function resolveNodeCollisions(nodes, gap = COLLISION_GAP, maxPasses = 80) {
  for (let pass = 0; pass < maxPasses; pass++) {
    let moved = false;
    const ordered = [...nodes].sort((a, b) => a.y - b.y || a.x - b.x);
    for (let i = 0; i < ordered.length; i++) {
      for (let j = i + 1; j < ordered.length; j++) {
        const a = ordered[i], b = ordered[j];
        const aBox = nodeBox(a), bBox = nodeBox(b);
        if (!boxesOverlap(aBox, bBox, gap)) continue;
        const push = (aBox.y + aBox.h + gap) - bBox.y;
        if (push > 0) {
          b.y += push;
          moved = true;
        }
      }
    }
    if (!moved) break;
  }
}

function clusterBox(c, nodes) {
  const members = (c.nodeIds || []).map(id => nodes.find(n => n.id === id)).filter(Boolean);
  if (!members.length) return null;
  const minX = Math.min(...members.map(n => n.x)) - CLUSTER_PAD;
  const minY = Math.min(...members.map(n => n.y)) - CLUSTER_PAD - CLUSTER_LABEL_H;
  const maxX = Math.max(...members.map(n => n.x + nodeW(n.label, n.description) + 10)) + CLUSTER_PAD;
  const maxY = Math.max(...members.map(n => n.y + nodeH(n) + 10)) + CLUSTER_PAD;
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

function resolveClusterIntrusions(nodes, clusters) {
  if (!clusters.length) return;
  for (let pass = 0; pass < 24; pass++) {
    let moved = false;
    for (const cluster of clusters) {
      const cBox = clusterBox(cluster, nodes);
      if (!cBox) continue;
      const memberIds = new Set(cluster.nodeIds || []);
      for (const node of nodes) {
        if (memberIds.has(node.id)) continue;
        const nBox = nodeBox(node);
        if (!boxesOverlap(cBox, nBox, CLUSTER_INTRUSION_GAP)) continue;
        if (nBox.x + nBox.w <= cBox.x || nBox.x >= cBox.x + cBox.w) continue;
        const clusterCenter = cBox.y + cBox.h / 2;
        const nodeCenterY = nBox.y + nBox.h / 2;
        if (nodeCenterY < clusterCenter && cBox.y - nBox.h - CLUSTER_INTRUSION_GAP >= 40) {
          node.y = cBox.y - nBox.h - CLUSTER_INTRUSION_GAP;
        } else {
          node.y = cBox.y + cBox.h + CLUSTER_INTRUSION_GAP;
        }
        moved = true;
      }
    }
    if (!moved) break;
    resolveNodeCollisions(nodes, COLLISION_GAP, 20);
  }
}

function moveCluster(cluster, nodes, dy) {
  const ids = new Set(cluster.nodeIds || []);
  nodes.forEach(node => {
    if (ids.has(node.id)) node.y += dy;
  });
}

function resolveClusterCollisions(nodes, clusters) {
  if (clusters.length < 2) return;
  for (let pass = 0; pass < 24; pass++) {
    let moved = false;
    const ordered = clusters
      .map(cluster => ({ cluster, box: clusterBox(cluster, nodes) }))
      .filter(item => item.box)
      .sort((a, b) => a.box.y - b.box.y || a.box.x - b.box.x);
    for (let i = 0; i < ordered.length; i++) {
      for (let j = i + 1; j < ordered.length; j++) {
        const a = ordered[i], b = ordered[j];
        if (!boxesOverlap(a.box, b.box, CLUSTER_INTRUSION_GAP)) continue;
        const push = (a.box.y + a.box.h + CLUSTER_INTRUSION_GAP) - b.box.y;
        if (push > 0) {
          moveCluster(b.cluster, nodes, push);
          moved = true;
        }
      }
    }
    if (!moved) break;
    resolveNodeCollisions(nodes, COLLISION_GAP, 20);
  }
}

/* ---------- edge-aware layout ---------- */
function distance(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function distancePointToSegment(p, a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return distance(p, a);
  const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / lenSq));
  return distance(p, { x: a.x + t * dx, y: a.y + t * dy });
}

function segmentDistance(a1, a2, b1, b2) {
  if (segmentsIntersect(a1, a2, b1, b2)) return 0;
  return Math.min(
    distancePointToSegment(a1, b1, b2),
    distancePointToSegment(a2, b1, b2),
    distancePointToSegment(b1, a1, a2),
    distancePointToSegment(b2, a1, a2)
  );
}

function orientation(a, b, c) {
  const v = (b.y - a.y) * (c.x - b.x) - (b.x - a.x) * (c.y - b.y);
  return Math.abs(v) < 0.001 ? 0 : v > 0 ? 1 : 2;
}

function onSegment(a, b, c) {
  return b.x <= Math.max(a.x, c.x) && b.x >= Math.min(a.x, c.x) &&
    b.y <= Math.max(a.y, c.y) && b.y >= Math.min(a.y, c.y);
}

function segmentsIntersect(a1, a2, b1, b2) {
  const o1 = orientation(a1, a2, b1);
  const o2 = orientation(a1, a2, b2);
  const o3 = orientation(b1, b2, a1);
  const o4 = orientation(b1, b2, a2);
  if (o1 !== o2 && o3 !== o4) return true;
  return (o1 === 0 && onSegment(a1, b1, a2)) ||
    (o2 === 0 && onSegment(a1, b2, a2)) ||
    (o3 === 0 && onSegment(b1, a1, b2)) ||
    (o4 === 0 && onSegment(b1, a2, b2));
}

function expandBox(box, pad) {
  return { x: box.x - pad, y: box.y - pad, w: box.w + pad * 2, h: box.h + pad * 2 };
}

function pointInBox(point, box) {
  return point.x >= box.x && point.x <= box.x + box.w && point.y >= box.y && point.y <= box.y + box.h;
}

function sampleCurve(points, steps = 12) {
  if (points.length < 3) return points;
  const [a, c, b] = points;
  const samples = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const mt = 1 - t;
    samples.push({
      x: mt * mt * a.x + 2 * mt * t * c.x + t * t * b.x,
      y: mt * mt * a.y + 2 * mt * t * c.y + t * t * b.y,
    });
  }
  return samples;
}

function edgeLabelBox(edge, x, y) {
  const labelW = Math.max(64, (edge.label || '').length * 13.2 + 30);
  const labelH = 34;
  const labelY = y - 12;
  return { x: x - labelW / 2, y: labelY - labelH / 2, w: labelW, h: labelH };
}

function edgeRoute(edge, edgeIndex, nodes = state.nodes, edges = state.edges) {
  const src = nodes.find(n => n.id === edge.sourceId);
  const tgt = nodes.find(n => n.id === edge.targetId);
  if (!src || !tgt) return null;
  if (src.id === tgt.id) {
    const b = nodeBox(src);
    const x1 = b.x + b.w + EDGE_END_PAD, y1 = b.y + b.h * 0.35;
    const x2 = b.x + b.w + EDGE_END_PAD, y2 = b.y + b.h * 0.65;
    const loopX = b.x + b.w + 72;
    const points = [{ x: x1, y: y1 }, { x: loopX, y: b.y - 26 }, { x: loopX, y: b.y + b.h + 26 }, { x: x2, y: y2 }];
    return { edge, src, tgt, points, samples: points, labelPoint: { x: loopX, y: b.y + b.h / 2 }, labelBox: edgeLabelBox(edge, loopX, b.y + b.h / 2) };
  }
  const start = edgeAnchor(src, tgt);
  const end = edgeAnchor(tgt, src);
  const dx = end.x - start.x, dy = end.y - start.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return null;
  const mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
  const off = Math.max(-160, Math.min(160, parallelEdgeOffset(edge, edgeIndex, edges) + Math.min(dist * 0.08, 32)));
  const control = { x: mx + dy / dist * off, y: my - dx / dist * off };
  const points = [start, control, end];
  return { edge, src, tgt, points, samples: sampleCurve(points), labelPoint: control, labelBox: edgeLabelBox(edge, control.x, control.y) };
}

function routeLength(route) {
  return route.samples.slice(1).reduce((total, point, index) => total + distance(route.samples[index], point), 0);
}

function routeProximityPenalty(a, b) {
  if (!a || !b) return 0;
  const incident = a.edge.sourceId === b.edge.sourceId || a.edge.sourceId === b.edge.targetId ||
    a.edge.targetId === b.edge.sourceId || a.edge.targetId === b.edge.targetId;
  let minDist = Infinity;
  for (let i = 1; i < a.samples.length; i++) {
    for (let j = 1; j < b.samples.length; j++) {
      minDist = Math.min(minDist, segmentDistance(a.samples[i - 1], a.samples[i], b.samples[j - 1], b.samples[j]));
    }
  }
  if (incident) return minDist < EDGE_MIN_SEPARATION * 0.45 ? (EDGE_MIN_SEPARATION * 0.45 - minDist) * 6 : 0;
  const crossingPenalty = minDist < 1 ? 2600 : 0;
  const proximityPenalty = minDist < EDGE_MIN_SEPARATION ? (EDGE_MIN_SEPARATION - minDist) * 36 : 0;
  return crossingPenalty + proximityPenalty;
}

function routeNodePenalty(route, nodes) {
  let penalty = 0;
  const endpointIds = new Set([route.edge.sourceId, route.edge.targetId]);
  nodes.forEach(node => {
    if (endpointIds.has(node.id)) return;
    const box = expandBox(nodeBox(node), 8);
    route.samples.slice(1, -1).forEach(point => {
      if (pointInBox(point, box)) penalty += 420;
    });
    if (boxesOverlap(route.labelBox, expandBox(nodeBox(node), 20))) penalty += 900;
  });
  return penalty;
}

function routeClusterPenalty(route, clusters, nodes) {
  let penalty = 0;
  const endpointIds = new Set([route.edge.sourceId, route.edge.targetId]);
  clusters.forEach(cluster => {
    const memberIds = new Set(cluster.nodeIds || []);
    if ([...endpointIds].some(id => memberIds.has(id))) return;
    const cBox = clusterBox(cluster, nodes);
    if (!cBox) return;
    if (boxesOverlap(route.labelBox, expandBox(cBox, 8))) penalty += 50000;
    route.samples.forEach(point => {
      if (pointInBox(point, expandBox(cBox, 4))) penalty += 25000;
    });
  });
  return penalty;
}

function routeIntraClusterNodePenalty(route, clusters, nodes) {
  let penalty = 0;
  const endpointIds = new Set([route.edge.sourceId, route.edge.targetId]);
  clusters.forEach(cluster => {
    const memberIds = new Set(cluster.nodeIds || []);
    if (!memberIds.has(route.edge.sourceId) || !memberIds.has(route.edge.targetId)) return;
    cluster.nodeIds.forEach(nid => {
      if (endpointIds.has(nid)) return;
      const node = nodes.find(n => n.id === nid);
      if (!node) return;
      const box = expandBox(nodeBox(node), 8);
      route.samples.slice(1, -1).forEach(point => {
        if (pointInBox(point, box)) penalty += 50000;
      });
      if (boxesOverlap(route.labelBox, expandBox(nodeBox(node), 20))) penalty += 50000;
    });
  });
  return penalty;
}

function scoreEdgeLayout(nodes, edges, initialY = {}, clusters = []) {
  const routes = edges.map((edge, index) => edgeRoute(edge, index, nodes, edges)).filter(Boolean);
  let score = 0;
  routes.forEach(route => {
    score += routeLength(route) * 0.035;
    score += routeNodePenalty(route, nodes);
    score += routeClusterPenalty(route, clusters, nodes);
    score += routeIntraClusterNodePenalty(route, clusters, nodes);
    const dy = Math.abs((initialY[route.edge.sourceId] ?? route.src.y) - route.src.y) +
      Math.abs((initialY[route.edge.targetId] ?? route.tgt.y) - route.tgt.y);
    score += dy * 0.08;
    const minEdgeLen = Math.max(route.labelBox.w * 1.3, 160);
    if (routeLength(route) < minEdgeLen) score += (minEdgeLen - routeLength(route)) * 2;
  });
  for (let i = 0; i < routes.length; i++) {
    for (let j = i + 1; j < routes.length; j++) {
      score += routeProximityPenalty(routes[i], routes[j]);
      if (boxesOverlap(routes[i].labelBox, routes[j].labelBox, 8)) score += 1300;
    }
  }
  return score;
}

function wouldOverlapAnyNode(node, nodes) {
  const movedBox = nodeBox(node);
  return nodes.some(other => other !== node && boxesOverlap(movedBox, nodeBox(other), COLLISION_GAP));
}

function resolveEdgeOverlaps(nodes, edges, clusters = []) {
  if (edges.length < 2 || nodes.length < 3) return;
  const initialY = {};
  nodes.forEach(node => { initialY[node.id] = node.y; });
  let bestScore = scoreEdgeLayout(nodes, edges, initialY, clusters);
  const ordered = [...nodes].sort((a, b) =>
    connectedEdgeIndexes(b.id).length - connectedEdgeIndexes(a.id).length ||
    a.y - b.y
  );
  for (let pass = 0; pass < EDGE_LAYOUT_PASSES; pass++) {
    let improved = false;
    for (const node of ordered) {
      const originalY = node.y;
      const candidates = [-2, -1, 1, 2].map(mult => originalY + mult * EDGE_LAYOUT_STEP)
        .filter(y => y >= 40 && Math.abs(y - initialY[node.id]) <= EDGE_LAYOUT_LIMIT);
      let chosenY = originalY;
      for (const candidateY of candidates) {
        node.y = candidateY;
        if (wouldOverlapAnyNode(node, nodes)) continue;
        const score = scoreEdgeLayout(nodes, edges, initialY, clusters);
        if (score + 0.5 < bestScore) {
          bestScore = score;
          chosenY = candidateY;
        }
      }
      node.y = chosenY;
      if (chosenY !== originalY) {
        improved = true;
        resolveNodeCollisions(nodes, COLLISION_GAP, 20);
        validateClusterSeparation(nodes, clusters);
        bestScore = scoreEdgeLayout(nodes, edges, initialY, clusters);
      }
    }
    if (!improved) break;
  }
}

/* ---------- auto-layout ---------- */
function buildTopologicalLayers(nodes, edges) {
  const adj = {}, inDeg = {};
  nodes.forEach(n => { adj[n.id] = []; inDeg[n.id] = 0; });
  edges.forEach(e => { adj[e.sourceId]?.push(e.targetId); if (inDeg[e.targetId] != null) inDeg[e.targetId]++; });
  let q = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  const visited = new Set();
  const layerIndex = {};
  while (q.length) {
    const current = [...q];
    current.forEach(id => {
      visited.add(id);
      if (layerIndex[id] == null) layerIndex[id] = 0;
    });
    const next = [];
    current.forEach(src => {
      adj[src]?.forEach(tgt => {
        layerIndex[tgt] = Math.max(layerIndex[tgt] || 0, layerIndex[src] + 1);
        inDeg[tgt]--;
        if (inDeg[tgt] === 0) next.push(tgt);
      });
    });
    q = next;
  }
  const fallbackLayer = Object.values(layerIndex).reduce((max, n) => Math.max(max, n), 0) + 1;
  nodes.filter(n => !visited.has(n.id)).forEach((n, i) => { layerIndex[n.id] = fallbackLayer + i; });
  const layerCount = Math.max(...Object.values(layerIndex), 0) + 1;
  const layers = Array.from({ length: layerCount }, () => []);
  nodes.forEach(n => { layers[layerIndex[n.id]].push(n.id); });
  /* ---------- barycenter crossing minimization ---------- */
  for (let i = 1; i < layers.length; i++) {
    const prevIdx = {};
    layers[i - 1].forEach((id, idx) => { prevIdx[id] = idx; });
    const bc = {};
    layers[i].forEach(id => {
      let sum = 0, cnt = 0;
      edges.forEach(e => {
        if (e.targetId === id && prevIdx[e.sourceId] != null) { sum += prevIdx[e.sourceId]; cnt++; }
        if (e.sourceId === id && prevIdx[e.targetId] != null) { sum += prevIdx[e.targetId]; cnt++; }
      });
      bc[id] = cnt > 0 ? sum / cnt : null;
    });
    const connected = layers[i].filter(id => bc[id] != null).sort((a, b) => bc[a] - bc[b]);
    const unconnected = layers[i].filter(id => bc[id] == null);
    layers[i] = [...connected, ...unconnected];
  }
  const orderedLayerIndex = {};
  layers.forEach((layer, li) => layer.forEach(id => { orderedLayerIndex[id] = li; }));
  return { layers, layerIndex: orderedLayerIndex };
}

function stackHeight(items) {
  return items.reduce((total, n, index) => total + nodeH(n) + (index ? NODE_GAP_Y : 0), 0);
}

function topologicalOrderInCluster(members, edges) {
  const memberSet = new Set(members.map(n => n.id));
  const adj = {}, inDeg = {};
  members.forEach(n => { adj[n.id] = []; inDeg[n.id] = 0; });
  edges.forEach(e => {
    if (memberSet.has(e.sourceId) && memberSet.has(e.targetId)) {
      adj[e.sourceId].push(e.targetId);
      inDeg[e.targetId]++;
    }
  });
  const q = members.filter(n => inDeg[n.id] === 0).map(n => n.id);
  const result = [];
  while (q.length) {
    const id = q.shift();
    result.push(id);
    adj[id].forEach(tgt => {
      inDeg[tgt]--;
      if (inDeg[tgt] === 0) q.push(tgt);
    });
  }
  members.forEach(n => { if (!result.includes(n.id)) result.push(n.id); });
  return result.map(id => members.find(n => n.id === id)).filter(Boolean);
}

function buildClusterLayouts(nodes, clusters, layerIndex, edges) {
  const assigned = new Set();
  const layouts = [];
  (clusters || []).forEach((cluster, index) => {
    const nodeIds = (cluster.nodeIds || []).filter(id => nodeMap[id] && !assigned.has(id));
    nodeIds.forEach(id => assigned.add(id));
    if (nodeIds.length) layouts.push({ id: cluster.id || `cluster-${index}`, cluster, index, nodeIds, isCluster: true });
  });
  const unclustered = nodes.filter(n => !assigned.has(n.id)).map(n => n.id);
  if (unclustered.length || !layouts.length) {
    layouts.push({ id: '__unclustered', cluster: null, index: layouts.length, nodeIds: unclustered.length ? unclustered : nodes.map(n => n.id), isCluster: false });
  }

  layouts.forEach(layout => {
    const layerSet = new Set(layout.nodeIds.map(id => layerIndex[id] ?? 0));
    const layerList = [...layerSet].sort((a, b) => a - b);
    layout.layers = layerList;
    layout.minLayer = layerList[0] ?? 0;
    layout.maxLayer = layerList[layerList.length - 1] ?? layout.minLayer;
    layout.medianLayer = layerList.length ? layerList[Math.floor(layerList.length / 2)] : layout.minLayer;
  });

  const layoutByNode = {};
  layouts.forEach(layout => layout.nodeIds.forEach(id => { layoutByNode[id] = layout; }));
  layouts.forEach(layout => { layout.connectedMedian = 9999; layout.connectionCount = 0; });
  edges.forEach(edge => {
    const a = layoutByNode[edge.sourceId], b = layoutByNode[edge.targetId];
    if (!a || !b || a === b) return;
    a.connectedMedian += b.medianLayer;
    b.connectedMedian += a.medianLayer;
    a.connectionCount++;
    b.connectionCount++;
  });
  layouts.forEach(layout => {
    layout.connectedMedian = layout.connectionCount ? layout.connectedMedian / layout.connectionCount : 9999;
  });
  const topoOrder = layoutTopologicalOrder(layouts, layoutByNode, edges);
  const topoPos = {};
  topoOrder.forEach((id, i) => { topoPos[id] = i; });
  layouts.forEach(l => { if (!(l.id in topoPos)) topoPos[l.id] = 9999; });
  return layouts.sort((a, b) =>
    topoPos[a.id] - topoPos[b.id] ||
    a.medianLayer - b.medianLayer ||
    a.minLayer - b.minLayer ||
    a.connectedMedian - b.connectedMedian ||
    a.index - b.index
  );
}

function layoutTopologicalOrder(layouts, layoutByNode, edges) {
  const out = {}, inDeg = {};
  const edgeCount = {};
  layouts.forEach(l => { out[l.id] = []; inDeg[l.id] = 0; edgeCount[l.id] = 0; });
  edges.forEach(edge => {
    const a = layoutByNode[edge.sourceId], b = layoutByNode[edge.targetId];
    if (!a || !b || a === b) return;
    edgeCount[a.id] = (edgeCount[a.id] || 0) + 1;
    edgeCount[b.id] = (edgeCount[b.id] || 0) + 1;
    if (!out[a.id].includes(b.id)) {
      out[a.id].push(b.id);
      inDeg[b.id]++;
    }
  });
  const q = layouts.filter(l => inDeg[l.id] === 0)
    .sort((a, b) => (edgeCount[a.id] || 0) - (edgeCount[b.id] || 0) || a.medianLayer - b.medianLayer)
    .map(l => l.id);
  const order = [];
  while (q.length) {
    const id = q.shift();
    order.push(id);
    (out[id] || []).forEach(tgt => {
      inDeg[tgt]--;
      if (inDeg[tgt] === 0) {
        const idx = q.findIndex(qid => {
          const qec = edgeCount[qid] || 0;
          const qml = layouts.find(x => x.id === qid)?.medianLayer ?? 0;
          const tec = edgeCount[tgt] || 0;
          const tml = layouts.find(x => x.id === tgt)?.medianLayer ?? 0;
          return tec < qec || (tec === qec && tml < qml);
        });
        q.splice(idx < 0 ? q.length : idx, 0, tgt);
      }
    });
  }
  layouts.forEach(l => { if (!order.includes(l.id)) order.push(l.id); });
  return order;
}

function positionClusters(layouts, nodes, edges) {
  const TOP_OFFSET = 140;
  let currentX = 60;

  layouts.forEach(layout => {
    const members = layout.nodeIds.map(id => nodes.find(n => n.id === id)).filter(Boolean);
    if (!members.length) return;

    const mode = (layout.cluster && layout.cluster.layout) || 'vertical';
    const ordered = topologicalOrderInCluster(members, edges);
    const maxNodeW = Math.max(...members.map(n => nodeW(n.label, n.description)), NODE_W);

    if (mode === 'circular' && ordered.length > 2) {
      const radius = Math.max(CIRCULAR_MIN_RADIUS, ordered.length * CIRCULAR_RADIUS_FACTOR);
      const clusterW = radius * 2 + maxNodeW + CLUSTER_PAD * 4;
      const centerX = currentX + clusterW / 2;
      const centerY = TOP_OFFSET + CLUSTER_PAD + CLUSTER_LABEL_H + radius + NODE_H / 2;

      ordered.forEach((node, i) => {
        const angle = (i / ordered.length) * 2 * Math.PI - Math.PI / 2;
        const nw = nodeW(node.label, node.description);
        const nh = nodeH(node);
        node.x = centerX + radius * Math.cos(angle) - nw / 2;
        node.y = centerY + radius * Math.sin(angle) - nh / 2;
      });

      currentX += clusterW + CLUSTER_GAP_X;
    } else {
      const clusterW = maxNodeW + CLUSTER_PAD * 2;
      const leftEdge = currentX + CLUSTER_PAD;
      const contentTop = TOP_OFFSET + CLUSTER_PAD + CLUSTER_LABEL_H;

      let curY = contentTop;
      ordered.forEach((node, ni) => {
        node.x = leftEdge;
        node.y = curY;
        if (ni < ordered.length - 1) {
          const next = ordered[ni + 1];
          const connectingEdges = edges.filter(e =>
            (e.sourceId === node.id && e.targetId === next.id) ||
            (e.sourceId === next.id && e.targetId === node.id)
          );
          const maxLabelW = connectingEdges.reduce((max, e) => {
            const lw = Math.max(64, (e.label || '').length * 13.2 + 30);
            return Math.max(max, lw);
          }, 0);
          const labelGap = Math.min(Math.max(maxLabelW * 1.2, 96), 320);
          curY += nodeH(node) + Math.max(NODE_GAP_Y, labelGap);
        } else {
          curY += nodeH(node) + NODE_GAP_Y;
        }
      });

      currentX += clusterW + CLUSTER_GAP_X;
    }
  });
}

function validateClusterSeparation(nodes, clusters) {
  resolveClusterIntrusions(nodes, clusters);
  resolveClusterCollisions(nodes, clusters);
}

function shouldClusterBeCircular(layout, edges) {
  if (!layout.isCluster) return false;
  const members = layout.nodeIds.map(id => nodeMap[id]).filter(Boolean);
  if (members.length < 3) return false;
  if (layout.cluster && layout.cluster.layout === 'circular') return false;
  const order = topologicalOrderInCluster(members, edges);
  const pos = {};
  order.forEach((n, i) => { pos[n.id] = i; });
  for (const edge of edges) {
    if (!layout.nodeIds.includes(edge.sourceId) || !layout.nodeIds.includes(edge.targetId)) continue;
    if (edge.sourceId === edge.targetId) continue;
    if (Math.abs((pos[edge.sourceId] ?? 0) - (pos[edge.targetId] ?? 0)) > 1) return true;
  }
  return false;
}

function autoLayout(nodes, edges, clusters = []) {
  const positioned = nodes.filter(n => n.x != null || n.y != null);
  const completeManualPositions = positioned.length === nodes.length &&
    positioned.every(n => n.x != null && n.y != null && Number.isFinite(Number(n.x)) && Number.isFinite(Number(n.y)));
  if (completeManualPositions) return;
  if (positioned.length) {
    nodes.forEach(n => { delete n.x; delete n.y; });
  }
  Object.keys(nodeMap).forEach(k => delete nodeMap[k]);
  nodes.forEach(n => { nodeMap[n.id] = n; });
  const { layers, layerIndex } = buildTopologicalLayers(nodes, edges);
  const layouts = buildClusterLayouts(nodes, clusters, layerIndex, edges);
  layouts.forEach(layout => {
    if (layout.cluster && shouldClusterBeCircular(layout, edges)) {
      layout.cluster.layout = 'circular';
    }
  });
  positionClusters(layouts, nodes, edges);
  resolveNodeCollisions(nodes, COLLISION_GAP, 40);
  validateClusterSeparation(nodes, clusters);
  resolveEdgeOverlaps(nodes, edges, clusters);
  resolveNodeCollisions(nodes, COLLISION_GAP, 20);
  validateClusterSeparation(nodes, clusters);
}

/* ---------- viewport ---------- */
function applyViewport() {
  const g = document.getElementById('viewport-group');
  g.setAttribute('transform', `translate(${state.viewX},${state.viewY}) scale(${state.viewScale})`);
  document.getElementById('zoom-level').textContent = Math.round(state.viewScale * 100) + '%';
}

function screenToLogical(sx, sy) {
  const r = canvas.getBoundingClientRect();
  return { x: (sx - r.left - state.viewX) / state.viewScale, y: (sy - r.top - state.viewY) / state.viewScale };
}

function zoomAt(px, py, factor) {
  const old = state.viewScale;
  state.viewScale = Math.max(0.15, Math.min(5, state.viewScale * factor));
  const ratio = state.viewScale / old;
  state.viewX = px - ratio * (px - state.viewX);
  state.viewY = py - ratio * (py - state.viewY);
  applyViewport();
}

function diagramBounds() {
  const nodes = state.nodes;
  if (!nodes.length) return null;
  const minX = Math.min(...nodes.map(n => n.x)) - 60;
  const minY = Math.min(...nodes.map(n => n.y)) - 60;
  const maxX = Math.max(...nodes.map(n => n.x + nodeW(n.label, n.description) + 30)) + 60;
  const maxY = Math.max(...nodes.map(n => n.y + nodeH(n) + 30)) + 60;
  return { minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY };
}

function fitToScreen({ readable = true } = {}) {
  const bounds = diagramBounds();
  if (!bounds) return;
  const r = canvas.getBoundingClientRect();
  const pad = { top: 96, right: 24, bottom: 72, left: 24 };
  const availableW = Math.max(1, r.width - pad.left - pad.right);
  const availableH = Math.max(1, r.height - pad.top - pad.bottom);
  const cw = bounds.w, ch = bounds.h;
  if (cw < 1 || ch < 1) return;
  const fitScale = Math.min(availableW / cw * 0.95, availableH / ch * 0.95, 2);
  state.viewScale = readable ? Math.max(MIN_READABLE_SCALE, fitScale) : Math.max(0.08, fitScale);
  const scaledW = cw * state.viewScale;
  const scaledH = ch * state.viewScale;
  state.viewX = pad.left + (availableW - scaledW) / 2 - bounds.minX * state.viewScale;
  const centeredY = pad.top + (availableH - scaledH) / 2 - bounds.minY * state.viewScale;
  const topAlignedY = pad.top - bounds.minY * state.viewScale;
  state.viewY = readable && scaledH > availableH ? topAlignedY : centeredY;
  applyViewport();
}

function fitAll() {
  fitToScreen({ readable: false });
}

function resetLayout() {
  try { localStorage.removeItem(getStorageKey()); } catch { /* ignore unavailable storage */ }
  state.nodes = (DIAGRAM_DATA.nodes || []).map(n => ({ ...n }));
  state.edges = (DIAGRAM_DATA.edges || []).map(e => ({ ...e }));
  state.clusters = (DIAGRAM_DATA.clusters || []).map(c => ({ ...c }));
  autoLayout(state.nodes, state.edges, state.clusters);
  state.selectedNodeId = null;
  state.selectedEdgeIndex = null;
  closeDetailsPanel();
  renderAll();
  fitToScreen();
}

/* ---------- theme ---------- */
function setTheme(name) {
  currentTheme = name;
  NODE_TYPES = th().nodeTypes;
  document.body.dataset.theme = name;
  const dot = document.getElementById('grid-dot');
  if (dot) dot.setAttribute('fill', th().gridDot);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = name === 'dark' ? 'Dark' : 'Light';
  localStorage.setItem('diagram-theme', name);
  renderAll();
}

/* ---------- rendering ---------- */
function clearEdges() {
  state.edgeElements.forEach(e => e.remove());
  state.edgeElements = [];
}

function clearClusters() {
  document.querySelectorAll('#clusters-layer > .cluster-group').forEach(el => el.remove());
}

function connectedEdgeIndexes(nodeId) {
  return state.edges
    .map((edge, index) => ({ edge, index }))
    .filter(({ edge }) => edge.sourceId === nodeId || edge.targetId === nodeId)
    .map(({ index }) => index);
}

function selectedNodeIds() {
  const ids = new Set();
  if (state.selectedNodeId) {
    ids.add(state.selectedNodeId);
    state.edges.forEach(edge => {
      if (edge.sourceId === state.selectedNodeId) ids.add(edge.targetId);
      if (edge.targetId === state.selectedNodeId) ids.add(edge.sourceId);
    });
  }
  if (state.selectedEdgeIndex != null) {
    const edge = state.edges[state.selectedEdgeIndex];
    if (edge) {
      ids.add(edge.sourceId);
      ids.add(edge.targetId);
    }
  }
  return ids;
}

function applyHighlights() {
  const selectedNodes = selectedNodeIds();
  const connectedEdges = state.selectedNodeId ? new Set(connectedEdgeIndexes(state.selectedNodeId)) : new Set();
  if (state.selectedEdgeIndex != null) connectedEdges.add(state.selectedEdgeIndex);
  const hasFocus = !!state.selectedNodeId || state.selectedEdgeIndex != null;

  Object.entries(el.nodes).forEach(([id, group]) => {
    group.classList.toggle('selected', selectedNodes.has(id) || state.selectedNodeId === id);
    group.classList.toggle('dimmed', hasFocus && !selectedNodes.has(id) && state.selectedNodeId !== id);
  });

  el.edgeGroups.forEach((group, index) => {
    const isSelected = state.selectedEdgeIndex === index || connectedEdges.has(index);
    group.classList.toggle('selected', isSelected);
    group.classList.toggle('dimmed', hasFocus && !isSelected);
  });
}

function closeDetailsPanel() {
  const panel = $('details-panel');
  panel.style.display = 'none';
  panel.innerHTML = '';
}

function fidelityLabel(value) {
  const labels = {
    'narrative-architecture': 'Narrative architecture',
    'exact-code-graph': 'Exact code graph',
    'executive-concept-map': 'Executive concept map',
  };
  return labels[value] || value || '';
}

function renderBriefPanel() {
  const panel = $('brief-panel');
  if (!panel) return;
  const hasBrief = DIAGRAM_DATA.audience || DIAGRAM_DATA.purpose || DIAGRAM_DATA.fidelity || (Array.isArray(DIAGRAM_DATA.takeaways) && DIAGRAM_DATA.takeaways.length);
  if (!hasBrief) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  const takeaways = Array.isArray(DIAGRAM_DATA.takeaways) ? DIAGRAM_DATA.takeaways.slice(0, 3) : [];
  const meta = [DIAGRAM_DATA.audience, fidelityLabel(DIAGRAM_DATA.fidelity)].filter(Boolean).join(' | ');
  panel.classList.toggle('collapsed', !state.briefExpanded);
  panel.innerHTML = `
    <button id="brief-toggle" type="button" aria-expanded="${String(state.briefExpanded)}" aria-controls="brief-body"><span>Brief</span><span aria-hidden="true">${state.briefExpanded ? '-' : '+'}</span></button>
    <div id="brief-body" class="brief-body">
      ${meta ? `<div class="brief-meta">${escapeHtml(meta)}</div>` : ''}
      ${DIAGRAM_DATA.purpose ? `<p>${escapeHtml(DIAGRAM_DATA.purpose)}</p>` : ''}
      ${takeaways.length ? `<ul>${takeaways.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>` : ''}
    </div>
  `;
  panel.querySelector('#brief-toggle').addEventListener('click', e => {
    e.stopPropagation();
    state.briefExpanded = !state.briefExpanded;
    renderBriefPanel();
  });
  panel.style.display = 'block';
}

function relationshipText(edge) {
  const src = state.nodes.find(n => n.id === edge.sourceId);
  const tgt = state.nodes.find(n => n.id === edge.targetId);
  return `${src?.label || edge.sourceId} -> ${tgt?.label || edge.targetId}`;
}

function showNodeDetails(node) {
  const panel = $('details-panel');
  const type = nodeTypeDef(node.type);
  const incident = connectedEdgeIndexes(node.id).map(index => state.edges[index]);
  panel.innerHTML = `
    <button class="panel-close" title="Close" aria-label="Close details">x</button>
    <h2>${escapeHtml(node.label)}</h2>
    <div class="meta"><span class="tag">${escapeHtml(normalizeType(node.type))}</span></div>
    ${node.description ? `<p>${escapeHtml(node.description)}</p>` : ''}
    <p><strong>Connected relationships</strong></p>
    <ul>${incident.map(edge => `<li>${escapeHtml(relationshipText(edge))}: ${escapeHtml(edge.label || 'related')}</li>`).join('') || '<li>No connected relationships.</li>'}</ul>
  `;
  panel.querySelector('.panel-close').addEventListener('click', () => {
    state.selectedNodeId = null;
    state.selectedEdgeIndex = null;
    closeDetailsPanel();
    applyHighlights();
  });
  positionDetailsPanel();
  panel.style.display = 'block';
}

function showEdgeDetails(edge, index) {
  const panel = $('details-panel');
  panel.innerHTML = `
    <button class="panel-close" title="Close" aria-label="Close details">x</button>
    <h2>${escapeHtml(edge.label || 'Relationship')}</h2>
    <div class="meta">${escapeHtml(relationshipText(edge))}</div>
    ${edge.evidence ? `<p><strong>Evidence:</strong> ${escapeHtml(edge.evidence)}</p>` : ''}
    ${edge.confidence ? `<p><strong>Confidence:</strong> ${escapeHtml(edge.confidence)}</p>` : ''}
    <p><span class="tag">Edge ${index + 1}</span></p>
  `;
  panel.querySelector('.panel-close').addEventListener('click', () => {
    state.selectedNodeId = null;
    state.selectedEdgeIndex = null;
    closeDetailsPanel();
    applyHighlights();
  });
  positionDetailsPanel();
  panel.style.display = 'block';
}

function selectNode(nodeId) {
  const node = state.nodes.find(n => n.id === nodeId);
  if (!node) return;
  state.selectedNodeId = nodeId;
  state.selectedEdgeIndex = null;
  showNodeDetails(node);
  applyHighlights();
}

function selectEdge(index) {
  const edge = state.edges[index];
  if (!edge) return;
  state.selectedNodeId = null;
  state.selectedEdgeIndex = index;
  showEdgeDetails(edge, index);
  applyHighlights();
}

function roughOpts(def, extra = {}) {
  return {
    fill: def.fill,
    stroke: def.stroke,
    strokeWidth: 2.2,
    roughness: 1.7,
    fillStyle: 'solid',
    ...extra,
  };
}

function drawNodeShape(g, def, x, y, w, h, scale = 1) {
  const pad = 3 * scale;
  const x0 = x + pad, y0 = y + pad, ww = w - pad * 2, hh = h - pad * 2;
  const r = Math.min(28 * scale, ww * 0.12, hh * 0.18);
  const opt = roughOpts(def);
  let shape;
  switch (def.shape) {
    case 'database':
      shape = rc.rectangle(x0, y0 + hh * 0.12, ww, hh * 0.76, opt);
      g.appendChild(shape);
      g.appendChild(rc.ellipse(x0 + ww / 2, y0 + hh * 0.13, ww, hh * 0.22, opt));
      g.appendChild(rc.ellipse(x0 + ww / 2, y0 + hh * 0.88, ww, hh * 0.20, {
        stroke: def.stroke, strokeWidth: 1.4, roughness: 1.3, fill: 'none',
      }));
      break;
    case 'queue':
      g.appendChild(rc.rectangle(x0 + 18 * scale, y0 + 18 * scale, ww - 24 * scale, hh - 22 * scale, roughOpts(def, { strokeWidth: 1.5 })));
      g.appendChild(rc.rectangle(x0 + 9 * scale, y0 + 9 * scale, ww - 18 * scale, hh - 18 * scale, roughOpts(def, { strokeWidth: 1.7 })));
      g.appendChild(rc.rectangle(x0, y0, ww - 12 * scale, hh - 14 * scale, opt));
      break;
    case 'file':
    case 'document': {
      const fold = Math.min(34 * scale, ww * 0.18, hh * 0.24);
      const path = `M ${x0} ${y0} L ${x0 + ww - fold} ${y0} L ${x0 + ww} ${y0 + fold} L ${x0 + ww} ${y0 + hh} L ${x0} ${y0 + hh} Z`;
      g.appendChild(rc.path(path, opt));
      g.appendChild(rc.path(`M ${x0 + ww - fold} ${y0} L ${x0 + ww - fold} ${y0 + fold} L ${x0 + ww} ${y0 + fold}`, {
        stroke: def.stroke, strokeWidth: 1.4, roughness: 1.1, fill: 'none',
      }));
      if (def.shape === 'document') {
        for (let i = 0; i < 3; i++) {
          const yy = y0 + hh * 0.62 + i * 14 * scale;
          g.appendChild(rc.line(x0 + ww * 0.20, yy, x0 + ww * 0.78, yy, { stroke: def.stroke, strokeWidth: 0.8, roughness: 1.2 }));
        }
      }
      break;
    }
    case 'bucket': {
      const path = `M ${x0 + ww * 0.12} ${y0 + hh * 0.20} L ${x0 + ww * 0.88} ${y0 + hh * 0.20} L ${x0 + ww * 0.78} ${y0 + hh * 0.92} L ${x0 + ww * 0.22} ${y0 + hh * 0.92} Z`;
      g.appendChild(rc.path(path, opt));
      g.appendChild(rc.ellipse(x0 + ww / 2, y0 + hh * 0.20, ww * 0.76, hh * 0.18, {
        stroke: def.stroke, strokeWidth: 1.4, roughness: 1.3, fill: 'none',
      }));
      break;
    }
    case 'actor': {
      g.appendChild(rc.rectangle(x0, y0, ww, hh, roughOpts(def, { roughness: 1.3 })));
      const cx = x0 + ww * 0.16;
      const cy = y0 + hh * 0.34;
      g.appendChild(rc.ellipse(cx, cy, 25 * scale, 25 * scale, { stroke: def.stroke, strokeWidth: 1.6, roughness: 1.4, fill: 'none' }));
      g.appendChild(rc.line(cx, cy + 14 * scale, cx, cy + 48 * scale, { stroke: def.stroke, strokeWidth: 1.6, roughness: 1.4 }));
      g.appendChild(rc.line(cx - 18 * scale, cy + 28 * scale, cx + 18 * scale, cy + 28 * scale, { stroke: def.stroke, strokeWidth: 1.4, roughness: 1.4 }));
      g.appendChild(rc.line(cx, cy + 48 * scale, cx - 16 * scale, cy + 72 * scale, { stroke: def.stroke, strokeWidth: 1.4, roughness: 1.4 }));
      g.appendChild(rc.line(cx, cy + 48 * scale, cx + 16 * scale, cy + 72 * scale, { stroke: def.stroke, strokeWidth: 1.4, roughness: 1.4 }));
      break;
    }
    case 'decision':
      g.appendChild(rc.polygon([[x0 + ww / 2, y0], [x0 + ww, y0 + hh / 2], [x0 + ww / 2, y0 + hh], [x0, y0 + hh / 2]], opt));
      break;
    case 'event':
      g.appendChild(rc.polygon([[x0 + ww * 0.13, y0], [x0 + ww * 0.87, y0], [x0 + ww, y0 + hh / 2], [x0 + ww * 0.87, y0 + hh], [x0 + ww * 0.13, y0 + hh], [x0, y0 + hh / 2]], opt));
      break;
    case 'warning':
      g.appendChild(rc.polygon([[x0 + ww * 0.24, y0], [x0 + ww * 0.76, y0], [x0 + ww, y0 + hh * 0.24], [x0 + ww, y0 + hh * 0.76], [x0 + ww * 0.76, y0 + hh], [x0 + ww * 0.24, y0 + hh], [x0, y0 + hh * 0.76], [x0, y0 + hh * 0.24]], opt));
      break;
    case 'cloud': {
      const path = `M ${x0 + ww * 0.18} ${y0 + hh * 0.67} C ${x0 + ww * 0.04} ${y0 + hh * 0.63}, ${x0 + ww * 0.05} ${y0 + hh * 0.42}, ${x0 + ww * 0.22} ${y0 + hh * 0.40} C ${x0 + ww * 0.27} ${y0 + hh * 0.20}, ${x0 + ww * 0.52} ${y0 + hh * 0.17}, ${x0 + ww * 0.62} ${y0 + hh * 0.34} C ${x0 + ww * 0.82} ${y0 + hh * 0.30}, ${x0 + ww * 0.96} ${y0 + hh * 0.45}, ${x0 + ww * 0.88} ${y0 + hh * 0.65} C ${x0 + ww * 0.74} ${y0 + hh * 0.80}, ${x0 + ww * 0.36} ${y0 + hh * 0.80}, ${x0 + ww * 0.18} ${y0 + hh * 0.67} Z`;
      g.appendChild(rc.path(path, opt));
      break;
    }
    case 'note': {
      const fold = Math.min(28 * scale, ww * 0.12, hh * 0.18);
      const path = `M ${x0} ${y0} L ${x0 + ww} ${y0} L ${x0 + ww} ${y0 + hh - fold} L ${x0 + ww - fold} ${y0 + hh} L ${x0} ${y0 + hh} Z`;
      g.appendChild(rc.path(path, opt));
      g.appendChild(rc.path(`M ${x0 + ww} ${y0 + hh - fold} L ${x0 + ww - fold} ${y0 + hh - fold} L ${x0 + ww - fold} ${y0 + hh}`, {
        stroke: def.stroke, strokeWidth: 1.2, roughness: 1.1, fill: 'none',
      }));
      break;
    }
    case 'process':
    case 'service':
    default:
      g.appendChild(rc.path(`M ${x0 + r} ${y0} L ${x0 + ww - r} ${y0} Q ${x0 + ww} ${y0} ${x0 + ww} ${y0 + r} L ${x0 + ww} ${y0 + hh - r} Q ${x0 + ww} ${y0 + hh} ${x0 + ww - r} ${y0 + hh} L ${x0 + r} ${y0 + hh} Q ${x0} ${y0 + hh} ${x0} ${y0 + hh - r} L ${x0} ${y0 + r} Q ${x0} ${y0} ${x0 + r} ${y0} Z`, opt));
      if (def.shape === 'service') {
        g.appendChild(rc.rectangle(x0 + 16 * scale, y0 + 16 * scale, 18 * scale, 18 * scale, { fill: def.stroke, stroke: def.stroke, roughness: 0.8, fillStyle: 'solid' }));
        g.appendChild(rc.rectangle(x0 + 16 * scale, y0 + 42 * scale, 18 * scale, 18 * scale, { fill: def.stroke, stroke: def.stroke, roughness: 0.8, fillStyle: 'solid' }));
      }
      break;
  }
}

function drawNodeContent(n, g) {
  g.innerHTML = '';
  const def = nodeTypeDef(n.type);
  const w = nodeW(n.label, n.description);
  const h = nodeH(n);
  drawNodeShape(g, def, n.x, n.y, w, h);
  const hasDesc = !!n.description;
  const titleY = hasDesc ? n.y + h * 0.24 : n.y + h / 2;
  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', n.x + w / 2); t.setAttribute('y', titleY + 4);
  t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
  t.setAttribute('font-size', TITLE_FONT_SIZE + 'px'); t.setAttribute('fill', th().nodeText);
  t.setAttribute('font-weight', '650');
  t.textContent = n.label;
  g.appendChild(t);
  if (hasDesc) {
    /* ---------- separator line ---------- */
    const sep = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    sep.setAttribute('x1', n.x + 30); sep.setAttribute('y1', titleY + 40);
    sep.setAttribute('x2', n.x + w - 30); sep.setAttribute('y2', titleY + 40);
    sep.setAttribute('stroke', def.stroke); sep.setAttribute('stroke-width', '1.2');
    sep.setAttribute('opacity', '0.25');
    g.appendChild(sep);
    /* ---------- multi-line description ---------- */
    const maxChars = Math.floor((w - 56) / 11.2);
    const lines = wrapText(n.description, maxChars);
    const d = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    d.setAttribute('x', n.x + w / 2); d.setAttribute('y', titleY + 68);
    d.setAttribute('text-anchor', 'middle'); d.setAttribute('dominant-baseline', 'central');
    d.setAttribute('font-size', DESCRIPTION_FONT_SIZE + 'px'); d.setAttribute('fill', th().nodeText);
    d.setAttribute('font-weight', '500');
    d.setAttribute('opacity', '0.82');
    lines.forEach((line, i) => {
      const tsp = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tsp.setAttribute('x', n.x + w / 2);
      tsp.setAttribute('dy', i === 0 ? '0' : '30');
      tsp.textContent = line;
      d.appendChild(tsp);
    });
    g.appendChild(d);
    /* ---------- hover tooltip ---------- */
    const titleEl = document.createElementNS('http://www.w3.org/2000/svg', 'title');
    titleEl.textContent = n.description;
    g.appendChild(titleEl);
  }
}

function renderNode(n) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('node-group');
  g.dataset.nodeId = n.id;
  drawNodeContent(n, g);
  const w = nodeW(n.label, n.description);
  return { group: g, w };
}

function nodeBox(n) {
  return { x: n.x, y: n.y, w: nodeW(n.label, n.description), h: nodeH(n) };
}

function nodeCenter(n) {
  const b = nodeBox(n);
  return { x: b.x + b.w / 2, y: b.y + b.h / 2 };
}

function edgeAnchor(from, to) {
  const a = nodeBox(from), ac = nodeCenter(from), bc = nodeCenter(to);
  const dx = bc.x - ac.x, dy = bc.y - ac.y;
  if (Math.abs(dx) >= Math.abs(dy)) {
    return dx >= 0 ? { x: a.x + a.w + EDGE_END_PAD, y: ac.y } : { x: a.x - EDGE_END_PAD, y: ac.y };
  }
  return dy >= 0 ? { x: ac.x, y: a.y + a.h + EDGE_END_PAD } : { x: ac.x, y: a.y - EDGE_END_PAD };
}

function parallelEdgeOffset(edge, edgeIndex, edges = state.edges) {
  const samePair = edges
    .map((candidate, index) => ({ candidate, index }))
    .filter(({ candidate }) => candidate.sourceId === edge.sourceId && candidate.targetId === edge.targetId);
  const pairIndex = Math.max(0, samePair.findIndex(({ index }) => index === edgeIndex));
  const pairOffset = (pairIndex - (samePair.length - 1) / 2) * 28;
  const key = `${edge.sourceId}->${edge.targetId}`;
  let hash = 0;
  for (let i = 0; i < key.length; i++) hash = ((hash << 5) - hash + key.charCodeAt(i)) | 0;
  const sign = hash % 2 === 0 ? 1 : -1;
  return pairOffset + sign * 18;
}

function buildEdgeContent(e, g, edgeIndex = 0) {
  const route = edgeRoute(e, edgeIndex, state.nodes, state.edges);
  if (!route) return;
  const { src, tgt } = route;
  if (src.id === tgt.id) {
    const pts = route.points.map(point => [point.x, point.y]);
    g.appendChild(rc.curve(pts, { stroke: th().edgeStroke, strokeWidth: 1.8, roughness: 0.8 }));
    const end = route.points[route.points.length - 1];
    drawArrow(g, end.x, end.y, Math.PI / 2);
    drawEdgeLabel(e, g, route.labelPoint.x, route.labelPoint.y);
    appendEdgeTooltip(e, g, src, tgt);
    return;
  }
  const pts = route.points.map(point => [point.x, point.y]);
  g.appendChild(rc.curve(pts, { stroke: th().edgeStroke, strokeWidth: 1.8, roughness: 0.8 }));
  const end = route.points[2], control = route.points[1];
  const ang = Math.atan2(end.y - control.y, end.x - control.x);
  drawArrow(g, end.x, end.y, ang);
  drawEdgeLabel(e, g, route.labelPoint.x, route.labelPoint.y);
  appendEdgeTooltip(e, g, src, tgt);
}

function drawArrow(g, x2, y2, ang) {
  const aLen = 10, aAng = 0.5;
  const ax1 = x2 - aLen * Math.cos(ang - aAng), ay1 = y2 - aLen * Math.sin(ang - aAng);
  const ax2 = x2 - aLen * Math.cos(ang + aAng), ay2 = y2 - aLen * Math.sin(ang + aAng);
  g.appendChild(rc.polygon([[x2,y2],[ax1,ay1],[ax2,ay2]], {
    fill: th().edgeStroke, stroke: th().edgeStroke, roughness: 0.5,
  }));
}

function drawEdgeLabel(e, g, x, y) {
  if (e.label) {
    const labelW = Math.max(64, e.label.length * 13.2 + 30);
    const labelH = 34;
    const labelY = y - 12;
    const pill = rc.rectangle(x - labelW / 2, labelY - labelH / 2, labelW, labelH, {
      fill: th().legendBg, stroke: th().legendBorder, strokeWidth: 0.8, roughness: 0.5, fillStyle: 'solid',
    });
    g.appendChild(pill);
    const lt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lt.setAttribute('x', x); lt.setAttribute('y', labelY);
    lt.setAttribute('class', 'edge-label');
    lt.setAttribute('fill', th().edgeLabel);
    lt.setAttribute('font-weight', '650');
    lt.textContent = e.label;
    g.appendChild(lt);
  }
}

function appendEdgeTooltip(e, g, src, tgt) {
  const titleEl = document.createElementNS('http://www.w3.org/2000/svg', 'title');
  const srcLabel = src.label, tgtLabel = tgt.label;
  const confMap = { observed: 'Observed', inferred: 'Inferred', stated: 'Stated' };
  const confLabel = e.confidence ? 'Confidence: ' + (confMap[e.confidence] || e.confidence) : '';
  const parts = [srcLabel + ' \u2192 ' + tgtLabel + ': ' + (e.label || '')];
  if (e.evidence) parts.push('Evidence: ' + e.evidence);
  if (confLabel) parts.push(confLabel);
  titleEl.textContent = parts.join('\n');
  g.appendChild(titleEl);
}

function renderEdge(e, edgeIndex = 0) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('edge-group');
  g.dataset.edgeIndex = String(edgeIndex);
  buildEdgeContent(e, g, edgeIndex);
  return g;
}

function renderCluster(c) {
  const mems = c.nodeIds.map(id => state.nodes.find(n => n.id === id)).filter(Boolean);
  if (!mems.length) return null;
  const minX = Math.min(...mems.map(n => n.x)) - CLUSTER_PAD;
  const minY = Math.min(...mems.map(n => n.y)) - CLUSTER_PAD - CLUSTER_LABEL_H;
  const maxX = Math.max(...mems.map(n => n.x + nodeW(n.label, n.description) + 10)) + CLUSTER_PAD;
  const maxY = Math.max(...mems.map(n => n.y + nodeH(n) + 10)) + CLUSTER_PAD;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('cluster-group');
  const bx = rc.rectangle(minX, minY, maxX - minX, maxY - minY, {
    fill: th().clusterFill, stroke: th().clusterStroke, strokeWidth: 1.5, roughness: 2.5, fillStyle: 'solid',
  });
  g.appendChild(bx);
  if (c.label) {
    const ct = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    ct.setAttribute('x', minX + (maxX - minX) / 2); ct.setAttribute('y', minY + 30);
    ct.setAttribute('class', 'cluster-label');
    ct.setAttribute('fill', th().clusterLabel);
    ct.textContent = c.label;
    g.appendChild(ct);
  }
  return g;
}

function renderLegend() {
  const panel = $('legend-panel');
  const toggle = $('legend-toggle');
  const list = $('legend-list');
  if (!panel || !toggle || !list) return;
  const usedTypes = new Set(state.nodes.map(n => normalizeType(n.type)));
  const types = Object.entries(NODE_TYPES).filter(([key]) => state.legendExpanded || usedTypes.has(key));
  panel.classList.toggle('collapsed', !state.legendExpanded);
  toggle.setAttribute('aria-expanded', String(state.legendExpanded));
  toggle.innerHTML = `<span>${state.legendExpanded ? 'Legend' : 'Legend'}</span><span aria-hidden="true">${state.legendExpanded ? '-' : '+'}</span>`;
  list.innerHTML = '';
  types.forEach(([key, val]) => {
    const row = document.createElement('div');
    row.className = 'legend-row';
    const swatch = document.createElement('span');
    swatch.className = 'legend-swatch';
    swatch.dataset.shape = val.shape;
    swatch.style.setProperty('--legend-fill', val.fill);
    swatch.style.setProperty('--legend-stroke', val.stroke);
    swatch.setAttribute('aria-hidden', 'true');
    const label = document.createElement('span');
    label.textContent = val.label;
    row.appendChild(swatch);
    row.appendChild(label);
    list.appendChild(row);
  });
}

function renderAll() {
  document.getElementById('nodes-layer').innerHTML = '';
  document.getElementById('edges-layer').innerHTML = '';
  document.getElementById('clusters-layer').innerHTML = '';
  document.getElementById('overlay-layer').innerHTML = '';
  state.edgeElements = [];
  el.nodes = {}; el.edgeGroups = []; el.clusters = {};

  // clusters first (behind)
  state.clusters.forEach(c => { const g = renderCluster(c); if (g) { document.getElementById('clusters-layer').appendChild(g); el.clusters[c.id] = g; } });
  // edges
  state.edges.forEach((e, i) => {
    const g = renderEdge(e, i);
    if (g) { document.getElementById('edges-layer').appendChild(g); state.edgeElements.push(g); el.edgeGroups.push(g); }
  });
  // nodes (on top)
  state.nodes.forEach(n => {
    const { group } = renderNode(n);
    document.getElementById('nodes-layer').appendChild(group);
    el.nodes[n.id] = group;
  });
  renderLegend();
  renderWarnings();
  applyHighlights();
  applyWalkthrough();
}

/* ---------- interactions ---------- */
let dragState = null;

function onPointerDown(e) {
  const t = e.target.closest('.node-group');
  if (t) {
    const id = t.dataset.nodeId;
    const node = state.nodes.find(n => n.id === id);
    if (!node) return;
    selectNode(id);
    const r = canvas.getBoundingClientRect();
    const l = screenToLogical(e.clientX, e.clientY);
    dragState = { nodeId: id, offX: l.x - node.x, offY: l.y - node.y, origX: node.x, origY: node.y };
    t.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.2))';
    return;
  }
  const edgeGroup = e.target.closest('.edge-group');
  if (edgeGroup) {
    const index = Number(edgeGroup.dataset.edgeIndex);
    selectEdge(index);
    dragState = null;
    return;
  }
  dragState = { pan: true, startX: e.clientX, startY: e.clientY, vx: state.viewX, vy: state.viewY };
}

function onPointerMove(e) {
  if (!dragState) return;
  if (dragState.pan) {
    state.viewX = dragState.vx + (e.clientX - dragState.startX);
    state.viewY = dragState.vy + (e.clientY - dragState.startY);
    applyViewport();
    return;
  }
  const node = state.nodes.find(n => n.id === dragState.nodeId);
  if (!node) return;
  const l = screenToLogical(e.clientX, e.clientY);
  node.x = l.x - dragState.offX;
  node.y = l.y - dragState.offY;
  const g = el.nodes[node.id];
  if (g) g.setAttribute('transform', `translate(${node.x - dragState.origX},${node.y - dragState.origY})`);
  // Update edge content in-place (reuse existing group containers)
  state.edges.forEach((edge, i) => {
    const group = el.edgeGroups[i];
    if (group) {
      while (group.firstChild) group.removeChild(group.firstChild);
      buildEdgeContent(edge, group, i);
    }
  });
  // Re-render clusters so their bounds follow node positions
  clearClusters();
  state.clusters.forEach(c => {
    const cg = renderCluster(c);
    if (cg) document.getElementById('clusters-layer').appendChild(cg);
  });
  applyHighlights();
}

function onPointerUp() {
  if (dragState && !dragState.pan && dragState.nodeId) {
    const node = state.nodes.find(n => n.id === dragState.nodeId);
    const g = el.nodes[dragState.nodeId];
    if (g && node) {
      g.setAttribute('transform', '');
      drawNodeContent(node, g);
      g.style.filter = '';
    }
    // Rebuild edges and clusters at final positions
    clearEdges();
    state.edgeElements = [];
    state.edges.forEach((edge, i) => {
      const g2 = renderEdge(edge, i);
      if (g2) { document.getElementById('edges-layer').appendChild(g2); state.edgeElements.push(g2); el.edgeGroups[i] = g2; }
    });
    clearClusters();
    state.clusters.forEach(c => {
      const cg = renderCluster(c);
      if (cg) document.getElementById('clusters-layer').appendChild(cg);
    });
    applyHighlights();
  }
  savePositions();
  dragState = null;
}

/* ---------- position persistence ---------- */
function getStorageKey() {
  return 'diagram-positions-' + (DIAGRAM_DATA.storageKey || DIAGRAM_DATA.title || 'diagram');
}

function savePositions() {
  try {
    const posMap = {};
    state.nodes.forEach(n => { posMap[n.id] = { x: n.x, y: n.y }; });
    const data = { version: VERSION, positions: posMap };
    localStorage.setItem(getStorageKey(), JSON.stringify(data));
  } catch (e) { /* localStorage unavailable or full; silently ignore */ }
}

function restorePositions() {
  try {
    const saved = localStorage.getItem(getStorageKey());
    if (!saved) return false;
    const data = JSON.parse(saved);
    const posMap = data.version === VERSION ? data.positions : null;
    if (!posMap) return false;
    const nodes = state.nodes;
    if (!nodes.every(n => posMap[n.id] != null)) return false;
    nodes.forEach(n => { n.x = posMap[n.id].x; n.y = posMap[n.id].y; });
    return true;
  } catch { return false; }
}

/* ---------- walkthrough ---------- */
function initWalkthrough() {
  const wt = DIAGRAM_DATA.walkthrough;
  state.walkthroughActive = false;
  state.walkthroughCurrentStep = -1;
  if (Array.isArray(wt) && wt.length) {
    const valid = wt.filter(s => Array.isArray(s.nodeIds) && s.nodeIds.length && s.nodeIds.some(id => state.nodes.find(n => n.id === id)));
    if (valid.length) {
      state.walkthroughSteps = valid;
      showWalkthroughButton();
      return;
    }
  }
  const inferred = inferWalkthroughSteps();
  if (inferred.length) {
    state.walkthroughSteps = inferred;
    showWalkthroughButton();
  }
}

function inferWalkthroughSteps() {
  const steps = [];
  const assigned = new Set();
  (DIAGRAM_DATA.clusters || []).forEach(c => {
    const ids = (c.nodeIds || []).filter(id => state.nodes.find(n => n.id === id));
    const unassigned = ids.filter(id => !assigned.has(id));
    if (unassigned.length) {
      steps.push({ id: 'cluster-' + (c.id || 'c' + steps.length), title: c.label || 'Cluster', nodeIds: unassigned });
      unassigned.forEach(id => assigned.add(id));
    }
  });
  state.nodes.forEach(n => {
    if (!assigned.has(n.id)) {
      steps.push({ id: 'node-' + n.id, title: n.label || n.id, nodeIds: [n.id] });
      assigned.add(n.id);
    }
  });
  return steps;
}

function showWalkthroughButton() {
  const btn = document.getElementById('walkthrough-btn');
  if (btn) btn.style.display = 'inline-block';
}

function isWalkthroughEdgeHighlighted(edge, stepNodeIds) {
  const set = new Set(stepNodeIds);
  return set.has(edge.sourceId) && set.has(edge.targetId);
}

function applyWalkthrough() {
  if (!state.walkthroughActive || state.walkthroughCurrentStep < 0) {
    document.querySelectorAll('.node-group.dimmed, .edge-group.dimmed').forEach(g => g.classList.remove('dimmed'));
    return;
  }
  const step = state.walkthroughSteps[state.walkthroughCurrentStep];
  if (!step) return;
  const focusIds = new Set(step.nodeIds);
  Object.entries(el.nodes).forEach(([id, group]) => {
    group.classList.toggle('dimmed', !focusIds.has(id));
  });
  el.edgeGroups.forEach(group => {
    const idx = Number(group.dataset.edgeIndex);
    const edge = state.edges[idx];
    if (!edge) return;
    group.classList.toggle('dimmed', !isWalkthroughEdgeHighlighted(edge, focusIds));
  });
}

function panToWalkthroughStep() {
  const step = state.walkthroughSteps[state.walkthroughCurrentStep];
  if (!step || !step.nodeIds.length) return;
  const nodes = step.nodeIds.map(id => state.nodes.find(n => n.id === id)).filter(Boolean);
  if (!nodes.length) return;
  const cx = nodes.reduce((s, n) => s + n.x + nodeW(n.label, n.description) / 2, 0) / nodes.length;
  const cy = nodes.reduce((s, n) => s + n.y + nodeH(n) / 2, 0) / nodes.length;
  const r = canvas.getBoundingClientRect();
  state.viewX = r.width / 2 - cx * state.viewScale;
  state.viewY = r.height / 2 - cy * state.viewScale;
  applyViewport();
}

function renderWalkthroughCard() {
  const card = document.getElementById('walkthrough-card');
  const count = document.getElementById('wt-card-count');
  const title = document.getElementById('wt-card-title');
  const desc = document.getElementById('wt-card-desc');
  if (!card) return;
  if (!state.walkthroughActive) {
    card.style.display = 'none';
    return;
  }
  const total = state.walkthroughSteps.length;
  const step = state.walkthroughSteps[state.walkthroughCurrentStep];
  count.textContent = (state.walkthroughCurrentStep + 1) + '/' + total;
  title.textContent = step ? step.title : '';
  if (step && step.description) {
    desc.textContent = step.description;
    desc.style.display = '';
  } else {
    desc.style.display = 'none';
  }
  const isLast = state.walkthroughCurrentStep >= total - 1;
  document.getElementById('wt-card-prev').disabled = state.walkthroughCurrentStep <= 0;
  const nextBtn = document.getElementById('wt-card-next');
  nextBtn.textContent = isLast ? '\u2713' : '\u2192';
  nextBtn.disabled = false;
  card.style.display = 'block';
}

function positionDetailsPanel() {
  const panel = document.getElementById('details-panel');
  if (!panel) return;
  if (state.walkthroughActive) {
    const card = document.getElementById('walkthrough-card');
    if (card && card.style.display !== 'none') {
      const cardRect = card.getBoundingClientRect();
      panel.style.top = (cardRect.bottom + 8) + 'px';
      panel.style.maxHeight = (window.innerHeight - cardRect.bottom - 24) + 'px';
      panel.style.right = '16px';
      panel.style.left = 'auto';
      panel.style.transform = 'none';
      return;
    }
  }
  panel.style.top = '';
  panel.style.right = '';
  panel.style.left = '';
  panel.style.transform = '';
  panel.style.maxHeight = '';
}

function startWalkthrough() {
  if (!state.walkthroughSteps.length) return;
  state.walkthroughActive = true;
  state.walkthroughCurrentStep = 0;
  document.getElementById('walkthrough-btn').classList.add('active');
  applyWalkthrough();
  panToWalkthroughStep();
  renderWalkthroughCard();
}

function stopWalkthrough() {
  state.walkthroughActive = false;
  state.walkthroughCurrentStep = -1;
  document.getElementById('walkthrough-btn').classList.remove('active');
  document.querySelectorAll('.node-group.dimmed, .edge-group.dimmed').forEach(g => g.classList.remove('dimmed'));
  renderWalkthroughCard();
  positionDetailsPanel();
}

function nextWalkthroughStep() {
  if (state.walkthroughCurrentStep >= state.walkthroughSteps.length - 1) {
    stopWalkthrough();
    return;
  }
  state.walkthroughCurrentStep++;
  applyWalkthrough();
  panToWalkthroughStep();
  renderWalkthroughCard();
}

function prevWalkthroughStep() {
  if (state.walkthroughCurrentStep > 0) {
    state.walkthroughCurrentStep--;
    applyWalkthrough();
    panToWalkthroughStep();
    renderWalkthroughCard();
  }
}

/* ---------- init ---------- */
function init() {
  state.warnings = validateDiagramData(DIAGRAM_DATA);
  setDiagramFont(currentFontName, { persist: false, rerender: false });
  state.nodes = (DIAGRAM_DATA.nodes || []).map(n => ({ ...n }));
  state.edges = (DIAGRAM_DATA.edges || []).map(e => ({ ...e }));
  state.clusters = (DIAGRAM_DATA.clusters || []).map(c => ({ ...c }));
  if (DIAGRAM_DATA.title) {
    const titleDisplay = document.getElementById('title-display');
    titleDisplay.textContent = DIAGRAM_DATA.title;
    titleDisplay.title = DIAGRAM_DATA.title;
  }
  if (!restorePositions()) {
    autoLayout(state.nodes, state.edges, state.clusters);
  }
  initWalkthrough();
  // Apply saved theme
  document.body.dataset.theme = currentTheme;
  const dot = document.getElementById('grid-dot');
  if (dot) dot.setAttribute('fill', th().gridDot);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = currentTheme === 'dark' ? 'Dark' : 'Light';
  renderAll();
  renderBriefPanel();
  setTimeout(() => fitToScreen(), 50);

  // events
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointerleave', onPointerUp);
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    zoomAt(e.clientX - r.left, e.clientY - r.top, e.deltaY > 0 ? 0.9 : 1.1);
  }, { passive: false });
  document.getElementById('zoom-in').addEventListener('click', () => {
    const r = canvas.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, 1.25);
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    const r = canvas.getBoundingClientRect();
    zoomAt(r.width / 2, r.height / 2, 0.8);
  });
  document.getElementById('font-menu-toggle').addEventListener('click', e => {
    e.stopPropagation();
    toggleFontMenu();
  });
  document.getElementById('font-menu').addEventListener('click', e => e.stopPropagation());
  document.getElementById('zoom-fit-all').addEventListener('click', fitAll);
  document.getElementById('reset-layout').addEventListener('click', resetLayout);
  document.getElementById('legend-toggle').addEventListener('click', e => {
    e.stopPropagation();
    state.legendExpanded = !state.legendExpanded;
    renderLegend();
  });
  document.getElementById('theme-toggle').addEventListener('click', () => {
    setTheme(currentTheme === 'light' ? 'dark' : 'light');
  });
  document.getElementById('walkthrough-btn').addEventListener('click', () => {
    if (state.walkthroughActive) stopWalkthrough();
    else startWalkthrough();
  });
  document.getElementById('wt-card-next').addEventListener('click', nextWalkthroughStep);
  document.getElementById('wt-card-prev').addEventListener('click', prevWalkthroughStep);
  document.getElementById('wt-card-close').addEventListener('click', stopWalkthrough);
  document.addEventListener('click', closeFontMenu);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeFontMenu();
      if (state.walkthroughActive) stopWalkthrough();
    }
    if (e.key === 'ArrowRight' && state.walkthroughActive) nextWalkthroughStep();
    if (e.key === 'ArrowLeft' && state.walkthroughActive) prevWalkthroughStep();
  });
  window.addEventListener('resize', () => {
    fitToScreen();
    positionFontMenu();
  });
}

init();
</script>
