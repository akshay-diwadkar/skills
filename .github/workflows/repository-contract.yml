name: Repository Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install pyyaml jsonschema
      - name: Validate catalog
        run: python tools/catalog/validate_catalog.py
      - name: Check catalog sync
        run: python tools/catalog/sync_catalog.py --check
      - name: Validate repository contract
        run: python tools/validation/validate_repository.py
      - name: Validate links
        run: python tools/validation/validate_links.py
      - name: Validate dependencies
        run: python tools/validation/validate_dependencies.py
      - name: Verify distribution packaging
        run: python tools/packaging/verify_distribution.py
