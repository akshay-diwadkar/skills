name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install ruff mypy pytest playwright pyyaml
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy .
      - name: Test
        run: python -m pytest -q
