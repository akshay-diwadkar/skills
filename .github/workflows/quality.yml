name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install ruff mypy pytest playwright pyyaml jsonschema
      - name: Lint
        run: ruff check .
      - name: Type check
        run: python tools/validation/run_mypy.py
      - name: Repository validation
        run: python tools/validation/validate_repository.py
      - name: Test
        run: python -m pytest -q

  cross-platform:
    name: Cross-Platform Runtime (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install pytest pyyaml jsonschema
      - name: Run installed skill execution tests
        run: python -m pytest tests/integration/test_installed_skill_execution.py -v
      - name: Run packaging verification
        run: python tools/packaging/verify_distribution.py

