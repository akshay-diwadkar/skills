name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.0.0). Defaults to v + contents of VERSION file.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  validate-release-gates:
    name: Mandatory Release Validation Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install ruff mypy pytest playwright pyyaml jsonschema

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: python tools/validation/run_mypy.py

      - name: Version alignment check
        run: python tools/release/check_version.py

      - name: Changelog validation
        run: python tools/release/build_changelog.py

      - name: Catalog validation
        run: python tools/catalog/validate_catalog.py

      - name: Check catalog sync
        run: python tools/catalog/sync_catalog.py --check

      - name: Validate repository contract
        run: python tools/validation/validate_repository.py

      - name: Validate links
        run: python tools/validation/validate_links.py

      - name: Validate dependencies
        run: python tools/validation/validate_dependencies.py

      - name: Verify distribution packaging
        run: python tools/packaging/verify_distribution.py

      - name: Run full test suite
        run: python -m pytest -q

  publish-release:
    name: Publish GitHub Release
    needs: validate-release-gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Determine Tag and Version
        id: prep
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.tag_name }}" ]; then
              TAG="${{ github.event.inputs.tag_name }}"
            else
              TAG="v${VERSION}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build Distribution Bundle
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          mkdir -p dist_tmp
          python tools/packaging/build_distribution.py --output-dir dist_tmp/skills
          cd dist_tmp && zip -r "../skills-${VERSION}.zip" skills && cd ..

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          name: Release ${{ steps.prep.outputs.tag }}
          body_path: CHANGELOG.md
          files: |
            skills-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
