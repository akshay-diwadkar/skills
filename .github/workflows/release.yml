name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.0.0). Defaults to v + contents of VERSION file.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install ruff mypy pytest pyyaml jsonschema

      - name: Check version alignment
        run: python tools/release/check_version.py

      - name: Validate changelog
        run: python tools/release/build_changelog.py

      - name: Validate repository contract
        run: python tools/validation/validate_repository.py

      - name: Check catalog sync
        run: python tools/catalog/sync_catalog.py --check

      - name: Run test suite
        run: python -m pytest -q

      - name: Determine Tag and Version
        id: prep
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.tag_name }}" ]; then
              TAG="${{ github.event.inputs.tag_name }}"
            else
              TAG="v${VERSION}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create and Push Git Tag (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.prep.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Build Distribution Bundle
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          mkdir -p dist_tmp
          python tools/packaging/build_distribution.py --output-dir dist_tmp/skills
          cd dist_tmp && zip -r "../skills-${VERSION}.zip" skills && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          name: Release ${{ steps.prep.outputs.tag }}
          body_path: CHANGELOG.md
          files: |
            skills-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
