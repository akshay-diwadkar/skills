name: Release Check

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install ruff mypy pytest pyyaml
      - name: Check version alignment
        run: python tools/release/check_version.py
      - name: Validate changelog
        run: python tools/release/build_changelog.py
      - name: Run contract checks
        run: python tools/validation/validate_repository.py
      - name: Verify packaging
        run: python tools/packaging/verify_distribution.py
      - name: Run test suite
        run: python -m pytest -q
