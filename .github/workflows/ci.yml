name: CI

on:
  push:
    branches: [main]
    paths:
      - "codebase-issue-auditor/**"
      - "create-diagram/**"
      - "github-issue-planner/**"
      - "implement-with-senior-dev/**"
      - "plan-with-senior-dev/**"
      - ".github/**"
      - ".gitignore"
      - "README.md"
      - "pyproject.toml"
      - "skills-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "codebase-issue-auditor/**"
      - "create-diagram/**"
      - "github-issue-planner/**"
      - "implement-with-senior-dev/**"
      - "plan-with-senior-dev/**"
      - ".github/**"
      - ".gitignore"
      - "README.md"
      - "pyproject.toml"
      - "skills-lock.json"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install ruff mypy pytest playwright
      - name: Validate skill tree
        run: python .github/scripts/validate_skill_tree.py
      - name: Lint
        run: >
          ruff check
          plan-with-senior-dev/scripts
          create-diagram/scripts
          create-diagram/test
          codebase-issue-auditor/scripts
          github-issue-planner/scripts
          .github/scripts
      - name: Type check plan-with-senior-dev
        run: mypy plan-with-senior-dev/scripts
      - name: Type check codebase-issue-auditor
        run: mypy codebase-issue-auditor/scripts
      - name: Type check github-issue-planner
        run: mypy github-issue-planner/scripts
      - name: Type check create-diagram
        run: mypy create-diagram/scripts create-diagram/test
      - name: Type check CI scripts
        run: mypy .github/scripts
      - name: Test
        run: python -m pytest -q

  create-diagram:
    name: create-diagram (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python -m unittest discover -s create-diagram/test -v
      - name: Template reference check
        run: python create-diagram/scripts/check_template_refs.py
      - name: Build smoke fixture
        run: >
          python create-diagram/scripts/build_diagram.py
          --data create-diagram/test/fixtures/complex.json
          --output "${{ runner.temp }}/create-diagram-smoke.html"
          --overwrite
      - name: Validate smoke fixture
        run: python create-diagram/scripts/validate_diagram.py "${{ runner.temp }}/create-diagram-smoke.html"
      - name: Install browser smoke dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium
      - name: Browser smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python create-diagram/scripts/browser_smoke.py
