[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
explicit_package_bases = true
mypy_path = ["tools/validation", "tools/packaging", "tools/catalog", "tools/release", "tools/agents"]
warn_unused_ignores = true
strict_optional = true
no_implicit_optional = true
exclude = [
  "tests/skills/plan-with-senior-dev/fixtures/",
  "tests/skills/plan-with-senior-dev/evals/fixtures/",
  "tests/skills/implement-with-senior-dev/evals/fixtures/",
  "tests/skills/design-codebase-with-senior-dev/evals/fixtures/",
  "tests/skills/optimize-codebase-with-senior-dev/evals/fixtures/",
  "tests/skills/codebase-issue-auditor/evals/fixtures/",
]

[[tool.mypy.overrides]]
module = ["playwright.*", "yaml", "yaml.*", "jsonschema", "jsonschema.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
testpaths = [
  "tests",
]
